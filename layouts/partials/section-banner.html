{{- $alps := resources.Get "images/alps.jpg" -}}
{{- $alpsWebp := $alps.Resize "1920x webp q75" -}}
{{- $alpsSmall := $alps.Resize "960x webp q70" -}}
{{- $color := .color | default "red" -}}
<section class="section-banner section-banner--{{ $color }}">
  <picture class="section-banner-bg">
    <source media="(max-width: 768px)" srcset="{{ $alpsSmall.RelPermalink }}">
    <source srcset="{{ $alpsWebp.RelPermalink }}">
    <img src="{{ $alpsWebp.RelPermalink }}" alt="" loading="eager">
  </picture>
  <div class="container">
    <h1>{{ .title }}</h1>
    {{ with .subtitle }}<p class="section-banner-sub">{{ . }}</p>{{ end }}
  </div>
</section>
