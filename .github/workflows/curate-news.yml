name: Curate News

on:
  schedule:
    # Daily at 06:00 UTC — tiers 1, 2
    - cron: '0 6 * * *'
    # Weekly Monday 07:00 UTC — tiers 1, 2, 3
    - cron: '0 7 * * 1'
    # Monthly 1st at 08:00 UTC — tiers 1, 2, 3, 4
    - cron: '0 8 1 * *'
  workflow_dispatch:
    inputs:
      tiers:
        description: 'Comma-separated tier numbers (empty = all)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: curate-news
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: javai-ch

      - uses: actions/checkout@v4
        with:
          repository: javai-org/javai-newsroom
          ref: main
          path: javai-newsroom
          token: ${{ secrets.ORG_REPO_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25-ea

      - uses: gradle/actions/setup-gradle@v4

      # Determine tiers based on schedule or manual input
      - name: Determine tiers
        id: tiers
        run: |
          if [ -n "${{ github.event.inputs.tiers }}" ]; then
            echo "tiers=${{ github.event.inputs.tiers }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 8 1 * *" ]; then
            echo "tiers=1,2,3,4" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 7 * * 1" ]; then
            echo "tiers=1,2,3" >> "$GITHUB_OUTPUT"
          else
            echo "tiers=1,2" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch and filter news
        working-directory: javai-ch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TIERS="${{ steps.tiers.outputs.tiers }}"
          ARGS="curateNews"
          if [ -n "$TIERS" ]; then
            ARGS="$ARGS -Ptiers=$TIERS"
          fi
          ./gradlew $ARGS

      - name: Check for changes
        id: changes
        working-directory: javai-ch
        run: |
          if git diff --quiet newsroom/data/feed.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new candidates found."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New candidates found in feed.yml."
          fi

      - name: Create or update PR
        if: steps.changes.outputs.changed == 'true'
        working-directory: javai-ch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="newsroom/curate"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add newsroom/data/feed.yml
          git commit -m "Add new feed candidates [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push --force-with-lease origin "$BRANCH"

          # Create PR if one doesn't already exist
          if gh pr view "$BRANCH" --json state -q '.state' 2>/dev/null | grep -q OPEN; then
            echo "PR already open — updated with force push."
          else
            BODY="New feed candidates from the automated pipeline."
            BODY="$BODY"$'\n\n'"## Curator instructions"
            BODY="$BODY"$'\n\n'"1. Review items under \`# -- New candidates --\` in \`newsroom/data/feed.yml\`"
            BODY="$BODY"$'\n'"2. Change \`accepted: n\` to \`accepted: y\` for items to publish"
            BODY="$BODY"$'\n'"3. Optionally adjust \`tags\` or set \`featured: y\`"
            BODY="$BODY"$'\n'"4. Merge this PR to deploy"
            BODY="$BODY"$'\n\n'"Items left as \`accepted: n\` will remain in the file to prevent re-proposal."
            gh pr create --base main --head "$BRANCH" \
              --title "Feed candidates for review" \
              --body "$BODY"
          fi
