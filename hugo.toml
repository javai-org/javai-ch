baseURL = 'https://javai.ch/'
title = 'Javai Schweiz'
enableRobotsTXT = true
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = true

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']

[params]
  author = "Javai"
  ogImage = "images/hero.jpg"
  keywords = [
    "AI regulation Switzerland",
    "FINMA AI",
    "ISO 42001",
    "probabilistic testing",
    "AI compliance",
    "AI governance Switzerland",
    "AI risk management",
    "non-deterministic testing",
    "Swiss AI regulation",
    "KI Regulierung Schweiz",
    "réglementation IA Suisse"
  ]

ignoreFiles = ['^drafts/']

[markup.goldmark.renderer]
  unsafe = true

# ── Languages ──

[languages.en]
  languageCode = 'en'
  languageName = 'English'
  contentDir = 'content/en'
  weight = 1

  [languages.en.params]
    description = "Navigating AI regulation in Switzerland — FINMA, ISO 42001, and the case for probabilistic testing."
    tagline = "Regulation. Compliance. Confidence."

  [[languages.en.menus.main]]
    name = 'Regulation News'
    pageRef = '/regulations'
    weight = 10
  [[languages.en.menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 20

[languages.de]
  languageCode = 'de'
  languageName = 'Deutsch'
  contentDir = 'content/de'
  weight = 2

  [languages.de.params]
    description = "KI-Regulierung in der Schweiz verstehen — FINMA, ISO 42001 und der Nutzen probabilistischer Tests."
    tagline = "Regulierung. Compliance. Vertrauen."

  [[languages.de.menus.main]]
    name = 'Regulierungsnachrichten'
    pageRef = '/regulations'
    weight = 10
  [[languages.de.menus.main]]
    name = 'Beiträge'
    pageRef = '/posts'
    weight = 20

[languages.fr]
  languageCode = 'fr'
  languageName = 'Français'
  contentDir = 'content/fr'
  weight = 3

  [languages.fr.params]
    description = "Comprendre la réglementation de l'IA en Suisse — FINMA, ISO 42001 et l'intérêt des tests probabilistes."
    tagline = "Réglementation. Conformité. Confiance."

  [[languages.fr.menus.main]]
    name = 'Actualités réglementaires'
    pageRef = '/regulations'
    weight = 10
  [[languages.fr.menus.main]]
    name = 'Articles'
    pageRef = '/posts'
    weight = 20

[languages.it]
  languageCode = 'it'
  languageName = 'Italiano'
  contentDir = 'content/it'
  weight = 4

  [languages.it.params]
    description = "Comprendere la regolamentazione dell'IA in Svizzera — FINMA, ISO 42001 e il valore dei test probabilistici."
    tagline = "Regolamentazione. Conformità. Fiducia."

  [[languages.it.menus.main]]
    name = 'Notizie normative'
    pageRef = '/regulations'
    weight = 10
  [[languages.it.menus.main]]
    name = 'Articoli'
    pageRef = '/posts'
    weight = 20
